name: Language Checks

permissions:
  contents: read
  pull-requests: read

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - '.gitignore'
      - 'docs/**'
      - 'scripts/**'
      - 'assets/**'
      - 'models/**'
      - 'tmp/**'
      - '.derived-data/**'
      - 'target/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - '.gitignore'
      - 'docs/**'
      - 'scripts/**'
      - 'assets/**'
      - 'models/**'
      - 'tmp/**'
      - '.derived-data/**'
      - 'target/**'
  merge_group:
    paths-ignore:
      - '**/*.md'
      - '.gitignore'
      - 'docs/**'
      - 'scripts/**'
      - 'assets/**'
      - 'models/**'
      - 'tmp/**'
      - '.derived-data/**'
      - 'target/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      swift: ${{ steps.filter.outputs.swift }}
      toml: ${{ steps.filter.outputs.toml }}
    steps:
      - name: Fetch latest code
        uses: actions/checkout@v6

      - name: Detect path changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            rust:
              - 'packages/**'
              - 'research/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'rust-toolchain.toml'
              - '.rustfmt.toml'
            swift:
              - 'apps/macos/**'
              - '.swift-format'
              - '.swiftlint.yml'
            toml:
              - '**/*.toml'
              - '.taplo.toml'
              - 'Makefile.toml'

  rust:
    name: Rust checks
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    steps:
      - name: Fetch latest code
        uses: actions/checkout@v6

      - name: Set up Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: true
          rustflags: ''

      - name: Install nightly rustfmt
        run: rustup toolchain install nightly --component rustfmt

      - name: Install cargo-make
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-make

      - name: Install nextest
        uses: taiki-e/install-action@v2
        with:
          tool: nextest

      - name: Run lint
        run: cargo make lint-rust

      - name: Run format checks
        run: cargo make fmt-rust-check

      - name: Run tests
        run: cargo make test-rust

  swift:
    name: Swift checks
    runs-on: macos-latest
    needs: changes
    if: needs.changes.outputs.swift == 'true'
    steps:
      - name: Fetch latest code
        uses: actions/checkout@v6

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint
        run: cargo make lint-swift

      - name: Run swift-format
        run: cargo make fmt-swift-check

  toml:
    name: TOML checks
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.toml == 'true'
    steps:
      - name: Fetch latest code
        uses: actions/checkout@v6

      - name: Set up Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: true
          rustflags: ''

      - name: Install cargo-make
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-make

      - name: Install taplo
        uses: taiki-e/install-action@v2
        with:
          tool: taplo

      - name: Run format checks
        run: cargo make fmt-taplo-check
