[tasks.clippy]
workspace = false
command = "cargo"
args = [
	"clippy",
	"--workspace",
	"--all-targets",
	"--all-features",
]

[tasks.dev]
workspace = false
dependencies = ["setup-macos"]
command = "cargo"
args = [
	"tauri",
	"dev",
]

[tasks.dev-trace]
workspace = false
dependencies = ["setup-macos"]
command = "bash"
args = [
	"-lc",
	"export AIR_STT_TRACE_DIR=\"$PWD/tmp/stt_trace\"; cargo tauri dev",
]

[tasks.fmt]
workspace = false
command = "cargo"
toolchain = "nightly"
args = [
	"fmt",
	"--all",
]

[tasks.nextest]
workspace = false
command = "cargo"
args = [
	"nextest",
	"run",
	"--workspace",
	"--all-targets",
	"--all-features",
	"--no-tests",
	"pass",
]

[tasks.setup-macos]
workspace = false
command = "bash"
args = [
	"scripts/setup_macos.sh",
]

[tasks.release]
workspace = false
dependencies = ["setup-macos"]
command = "cargo"
args = [
	"tauri",
	"dev",
	"--release"
]

[tasks.udeps]
workspace = false
command = "cargo"
toolchain = "nightly"
args = [
	"udeps",
	"--workspace",
	"--all-targets",
	"--all-features",
]

[tasks.stt-compare]
workspace = false
dependencies = ["setup-macos"]
command = "bash"
args = [
	"-lc",
	"if [[ \"$(uname -s)\" == \"Darwin\" ]]; then export RUSTFLAGS=\"$RUSTFLAGS -lc++ -l framework=Accelerate\"; fi; cargo run -p stt-compare --release -- --manifest research/stt_compare/manifest.toml",
]

[tasks.stt-compare-mic]
workspace = false
dependencies = ["setup-macos"]
command = "bash"
args = [
	"-lc",
	"if [[ \"$(uname -s)\" == \"Darwin\" ]]; then export RUSTFLAGS=\"$RUSTFLAGS -lc++ -l framework=Accelerate\"; fi; cargo run -p stt-compare --release -- --mic",
]

[tasks.sherpa-demo]
workspace = false
command = "bash"
args = ["-lc", "cd research/sherpa && poetry install --no-interaction && poetry run sherpa-onnx-demo"]

[tasks.sherpa-demo-mic]
workspace = false
command = "bash"
args = ["-lc", "cd research/sherpa && poetry install --no-interaction && poetry run sherpa-onnx-demo --mic"]
