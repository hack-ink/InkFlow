# Run (services/apps)
# | task            | type    | cwd |
# | --------------- | ------- | --- |
# | dev             | command |     |
# | release         | command |     |
# | stt-compare     | command |     |
# | stt-compare-mic | command |     |
# | sherpa-demo     | command |     |
# | sherpa-demo-mic | command |     |

[tasks.dev]
workspace = false
dependencies = ["setup-macos"]
command = "bash"
args = [
	"-lc",
	"scripts/run.sh debug",
]

[tasks.release]
workspace = false
dependencies = ["setup-macos"]
command = "bash"
args = [
	"-lc",
	"scripts/run.sh release",
]

[tasks.stt-compare]
workspace = false
dependencies = ["setup-macos"]
command = "bash"
args = [
	"-lc",
	"if [[ \"$(uname -s)\" == \"Darwin\" ]]; then export RUSTFLAGS=\"$RUSTFLAGS -lc++ -l framework=Accelerate\"; fi; cargo run -p stt-compare --release -- --manifest research/stt_compare/manifest.toml",
]

[tasks.stt-compare-mic]
workspace = false
dependencies = ["setup-macos"]
command = "bash"
args = [
	"-lc",
	"if [[ \"$(uname -s)\" == \"Darwin\" ]]; then export RUSTFLAGS=\"$RUSTFLAGS -lc++ -l framework=Accelerate\"; fi; cargo run -p stt-compare --release -- --mic",
]

[tasks.sherpa-demo]
workspace = false
command = "bash"
args = [
	"-lc",
	"cd research/sherpa && poetry install --no-interaction && poetry run sherpa-onnx-demo",
]

[tasks.sherpa-demo-mic]
workspace = false
command = "bash"
args = [
	"-lc",
	"cd research/sherpa && poetry install --no-interaction && poetry run sherpa-onnx-demo --mic",
]

# Lint
# | task           | type      | cwd |
# | -------------- | --------- | --- |
# | lint           | composite |     |
# | lint-fix-rust  | extend    |     |
# | lint-rust      | command   |     |
# | lint-fix-swift | extend    |     |
# | lint-swift     | command   |     |

[tasks.lint]
workspace = false
dependencies = [
	"lint-rust",
	"lint-swift",
]

[tasks.lint-rust]
workspace = false
command = "cargo"
args = [
	"clippy",
	"--workspace",
	"--all-targets",
	"--all-features",
]

[tasks.lint-fix-rust]
extend = "lint-rust"
args = [
	"clippy",
	"--fix",
	"--allow-dirty",
	"--workspace",
	"--all-targets",
	"--all-features",
]

[tasks.lint-swift]
workspace = false
command = "swiftlint"
args = [
	"lint",
	"--config",
	".swiftlint.yml",
	"apps/macos/InkFlow/InkFlow",
]

[tasks.lint-fix-swift]
extend = "lint-swift"
args = [
	"autocorrect",
	"--config",
	".swiftlint.yml",
	"apps/macos/InkFlow/InkFlow",
]

# Test
# | task      | type      | cwd |
# | --------- | --------- | --- |
# | test      | composite |     |
# | test-rust | command   |     |

[tasks.test]
workspace = false
dependencies = ["test-rust"]

[tasks.test-rust]
workspace = false
command = "cargo"
args = [
	"nextest",
	"run",
	"--workspace",
	"--all-targets",
	"--all-features",
	"--no-tests",
	"pass",
]

# Format
# | task            | type      | cwd |
# | --------------- | --------- | --- |
# | fmt             | composite |     |
# | fmt-check       | composite |     |
# | fmt-rust        | command   |     |
# | fmt-rust-check  | extend    |     |
# | fmt-swift       | command   |     |
# | fmt-swift-check | command   |     |
# | fmt-taplo       | command   |     |
# | fmt-taplo-check | extend    |     |

[tasks.fmt]
workspace = false
dependencies = [
	"fmt-rust",
	"fmt-swift",
	"fmt-taplo",
]

[tasks.fmt-check]
workspace = false
dependencies = [
	"fmt-rust-check",
	"fmt-swift-check",
	"fmt-taplo-check",
]

[tasks.fmt-rust]
workspace = false
command = "cargo"
toolchain = "nightly"
args = [
	"fmt",
	"--all",
]

[tasks.fmt-rust-check]
extend = "fmt-rust"
args = [
	"fmt",
	"--all",
	"--",
	"--check",
]

[tasks.fmt-swift]
workspace = false
command = "swift"
args = [
	"format",
	"--recursive",
	"--in-place",
	"--configuration",
	".swift-format",
	"apps/macos/InkFlow/InkFlow",
]

[tasks.fmt-swift-check]
workspace = false
command = "swift"
args = [
	"format",
	"lint",
	"--strict",
	"--recursive",
	"--configuration",
	".swift-format",
	"apps/macos/InkFlow/InkFlow",
]

[tasks.fmt-taplo]
workspace = false
command = "taplo"
args = ["fmt"]

[tasks.fmt-taplo-check]
extend = "fmt-taplo"
args = [
	"fmt",
	"--check",
]

# Set up/Install
# | task        | type    | cwd |
# | ----------- | ------- | --- |
# | setup-macos | command |     |

[tasks.setup-macos]
workspace = false
command = "bash"
args = [
	"scripts/setup-macos.sh",
]

# Meta/Orchestration
# | task   | type      | cwd |
# | ------ | --------- | --- |
# | checks | composite |     |

[tasks.checks]
workspace = false
dependencies = [
	"lint",
	"fmt-check",
	"test",
]
