[tasks.clippy]
workspace = false
command = "cargo"
args = [
	"clippy",
	"--workspace",
	"--all-targets",
	"--all-features",
]

[tasks.dev]
workspace = false
dependencies = ["setup-macos"]
command = "xcodebuild"
args = [
	"-project",
	"apps/macos/InkFlow/InkFlow.xcodeproj",
	"-scheme",
	"InkFlow",
	"-configuration",
	"Debug",
	"build",
]

[tasks.fmt]
workspace = false
dependencies = [
	"fmt-rust",
	"fmt-swift",
	"fmt-taplo",
]

[tasks.fmt-rust]
workspace = false
command = "cargo"
toolchain = "nightly"
args = [
	"fmt",
	"--all",
]

[tasks.fmt-swift]
workspace = false
command = "swift"
args = [
	"format",
	"--recursive",
	"--in-place",
	"--configuration",
	".swift-format",
	"apps/macos/InkFlow/InkFlow",
]

[tasks.fmt-taplo]
workspace = false
command = "taplo"
args = ["fmt"]

[tasks.lint]
workspace = false
dependencies = ["clippy", "lint-swift"]

[tasks.lint-swift]
workspace = false
command = "swiftlint"
args = [
	"lint",
	"--config",
	".swiftlint.yml",
	"--path",
	"apps/macos/InkFlow/InkFlow",
]

[tasks.nextest]
workspace = false
command = "cargo"
args = [
	"nextest",
	"run",
	"--workspace",
	"--all-targets",
	"--all-features",
	"--no-tests",
	"pass",
]

[tasks.setup-macos]
workspace = false
command = "bash"
args = [
	"scripts/setup_macos.sh",
]

[tasks.release]
workspace = false
dependencies = ["setup-macos"]
command = "xcodebuild"
args = [
	"-project",
	"apps/macos/InkFlow/InkFlow.xcodeproj",
	"-scheme",
	"InkFlow",
	"-configuration",
	"Release",
	"build",
]

[tasks.udeps]
workspace = false
command = "cargo"
toolchain = "nightly"
args = [
	"udeps",
	"--workspace",
	"--all-targets",
	"--all-features",
]

[tasks.stt-compare]
workspace = false
dependencies = ["setup-macos"]
command = "bash"
args = [
	"-lc",
	"if [[ \"$(uname -s)\" == \"Darwin\" ]]; then export RUSTFLAGS=\"$RUSTFLAGS -lc++ -l framework=Accelerate\"; fi; cargo run -p stt-compare --release -- --manifest research/stt_compare/manifest.toml",
]

[tasks.stt-compare-mic]
workspace = false
dependencies = ["setup-macos"]
command = "bash"
args = [
	"-lc",
	"if [[ \"$(uname -s)\" == \"Darwin\" ]]; then export RUSTFLAGS=\"$RUSTFLAGS -lc++ -l framework=Accelerate\"; fi; cargo run -p stt-compare --release -- --mic",
]

[tasks.sherpa-demo]
workspace = false
command = "bash"
args = ["-lc", "cd research/sherpa && poetry install --no-interaction && poetry run sherpa-onnx-demo"]

[tasks.sherpa-demo-mic]
workspace = false
command = "bash"
args = ["-lc", "cd research/sherpa && poetry install --no-interaction && poetry run sherpa-onnx-demo --mic"]
